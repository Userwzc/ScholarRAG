name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run lint
        run: ruff check .

      - name: Run unit tests
        run: pytest tests -k "not integration" -v --tb=short
        env:
          # Mock environment for tests
          EMBEDDING_MODEL: mock-model
          OPENAI_API_KEY: test-key-mock
          OPENAI_API_BASE: http://localhost:9999/mock
          LLM_MODEL: mock-llm
          QDRANT_HOST: localhost
          QDRANT_PORT: 6333
          QDRANT_COLLECTION_NAME: test_collection
          RAG_TOP_K: 5
          SCORE_THRESHOLD: 0.3
          AGENT_MAX_ITERATIONS: 5
          ENABLE_HYBRID: false
          MINERU_BACKEND: pipeline
          MINERU_MODEL_SOURCE: local
          PDF_STORAGE_DIR: /tmp/scholarrag_test_pdfs

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: |
            .pytest_cache/
            htmlcov/

  evaluation:
    runs-on: ubuntu-latest
    needs: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run evaluation runner
        run: python -m tests.evaluation.runner --output reports/evaluation_report.json --thresholds-file tests/evaluation/thresholds.json
        continue-on-error: true
        env:
          # Mock environment for evaluation
          EMBEDDING_MODEL: mock-model
          OPENAI_API_KEY: test-key-mock
          OPENAI_API_BASE: http://localhost:9999/mock
          LLM_MODEL: mock-llm
          QDRANT_HOST: localhost
          QDRANT_PORT: 6333

      - name: Upload evaluation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-results
          path: |
            reports/
            .evaluation_cache/

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Upload build artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
