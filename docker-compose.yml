services:
  api:
    build: .
    ports:
      - "${API_PORT_HOST:-8000}:8000"
    environment:
      - QDRANT_HOST=qdrant
    depends_on:
      - qdrant

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "${QDRANT_PORT_HOST:-6333}:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  qdrant_storage:
